    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        .serif {
            font-family: 'Playfair Display', serif;
        }
        .handwritten {
            font-family: 'Caveat', cursive;
        }
        
        .gradient-text {
            background: linear-gradient(to right, #7E22CE, #DB2777, #EA580C);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            padding-top: 0.1em;
            padding-bottom: 0.2em;
            padding-right: 0.4em;
            padding-left: 0.05em;
            margin-top: -0.1em;
            margin-bottom: -0.2em;
            margin-right: -0.4em;
            margin-left: -0.05em;
            vertical-align: baseline;
        }

        .highlight-blue {
            background-color: #eff6ff; /* blue-50 */
            border-radius: 0.8em;
            padding: 0.15em 0.4em;
            margin: 0 0.1em;
            display: inline;
            box-decoration-break: clone;
            -webkit-box-decoration-break: clone;
            white-space: normal;
            line-height: 1.4;
        }

        .sketchy-highlight-custom {
            position: relative;
            display: inline;
            z-index: 1;
        }

        .sketchy-highlight-custom::after {
            content: '';
            position: absolute;
            left: 0.5ch;   /* Start cover from right half of 'r' */
            right: 0.5ch;  /* End cover at left half of 'd' */
            top: 20%;
            bottom: 5%;
            background-color: #eff6ff; /* blue-50 */
            z-index: -1;
            border-radius: 15% 85% 25% 75% / 50% 30% 70% 50%; /* Irregular "sketchy" shape */
            transform: rotate(-0.5deg);
        }

        .underline-blue {
            position: relative;
            z-index: 1;
        }
        
        .underline-blue::after {
            content: '';
            position: absolute;
            left: -0.2em;
            right: -0.2em;
            bottom: 0.05em;
            height: 0.3em;
            background-color: #eff6ff; /* blue-50 */
            border-radius: 9999px;
            z-index: -1;
        }

        .quote-box {
            background-color: #fcfcfc;
            border-radius: 2rem;
            border-left: 6px solid #eff6ff; /* soft blue border */
            position: relative;
            padding: 2.5rem 3rem;
            margin-top: 2rem;
            box-shadow: 0 4px 20px -5px rgba(0,0,0,0.03);
        }

        .slide-in-right {
          animation: slideInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideInTop {
          from {
            opacity: 0;
            transform: translateY(-20px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
        
        .slide-in-top {
          animation: slideInTop 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideInRight {
            0% {
                transform: translateX(20px);
                opacity: 0;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pin {
            width: 14px;
            height: 14px;
            background: radial-gradient(circle at 30% 30%, #f3f4f6, #9ca3af);
            border-radius: 50%;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
    </style>
